<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upfound</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Nav-Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm ub-bg">
        <div class="container-fluid ub-bg pd">
            <a href="index.html"><img src="Asset/UPFOUND.svg" alt="Company Logo" class = "Logo"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="About.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Support.html">Support</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-light" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="item-form-body d-flex align-items-center">
        <div class="container-fluid">
            <div class = "row justify-content-center text-center">
                <h1 class="form-heading mb-4"> แบบฟอร์มแจ้งพบบุคคล</h1>
                <div class="col-12 col-lg-8">
                    <div class="form-doc-item text-start">
                        <form>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="foundImages" class="form-label">แนบภาพบุคคลที่พบ <span style="color: red;">*</span></label><br>
                                    <label for="SubfoundImages" class="sub-form-label">Attach photos (up to 8 images)</label>
                                    <input type="file" class="form-control" id="foundImages" accept="image/*" multiple required>
                                    <div id="foundImagesError" class="text-danger small mt-1"></div>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="foundLocation" class="form-label">สถานที่พบเห็น<span style="color: red;">*</span></label><br>
                                    <label for="SubfoundLocation" class="sub-form-label">Location found</label>
                                    <input type="text" class="form-control" id="foundLocation" placeholder="เช่น หน้าหอสมุด มหาวิทยาลัย" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="foundDate" class="form-label">วันที่พบ<span style="color: red;">*</span></label><br>
                                    <label for="SubfoundDate" class="sub-form-label">Date found</label>
                                    <input type="date" class="form-control" id="foundDate" required>
                                </div>
                                <div class="col-12">
                                    <label for="foundDetail" class="form-label">รายละเอียดเพิ่มเติม</label><br>
                                    <label for="SubfoundDetail" class="sub-form-label">Additional details (optional)</label>
                                    <textarea class="form-control" id="foundDetail" rows="3" placeholder="เช่น เพศ ช่วงอายุ ลักษณะเด่น เสื้อผ้าที่สวมใส่"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="foundContact" class="form-label">ช่องทางติดต่อกลับ<span style="color: red;">*</span></label><br>
                                    <label for="SubfoundContact" class="sub-form-label">Your contact info (phone / Line ID)</label>
                                    <input type="text" class="form-control" id="foundContact" placeholder="เช่น 08X-XXX-XXXX หรือ Line ID" required>
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-primary form-submit-btn">แจ้งพบบุคคล</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-section">
        <div class="container">
            <div class="row justify-content-center text-center">
                <p class="sfw mb-0">&copy; 2026 Upfound Co. All rights reserved.</p>
            </div>
        </div>
    </div>

</body>
</html>
