<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upfound</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Nav-Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm ub-bg">
        <div class="container-fluid ub-bg pd">
            <img src="Assest/UPFOUND.svg" alt="Company Logo" class = "Logo">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Support</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-light" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="item-form-body d-flex align-items-center">
        <div class="container-fluid">
            <div class = "row justify-content-center text-center">
                <h1 class="form-heading mb-4"> แบบฟอร์มแจ้งบุคคลหาย</h1>
                <div class="col-12 col-lg-8">
                    <div class="form-doc-item text-start">
                        <form>
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="personName" class="form-label">ชื่อ-นามสกุล<span style="color: red;">*</span></label><br>
                                    <label for="SubpersonName" class="sub-form-label">Full name</label>
                                    <input type="text" class="form-control" id="personName" placeholder="เช่น สมชาย ใจดี" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="personGender" class="form-label">เพศ<span style="color: red;">*</span></label><br>
                                    <label for="SubpersonGender" class="sub-form-label">Gender</label>
                                    <select class="form-select" id="personGender" required>
                                        <option value="" selected disabled>เลือกเพศ</option>
                                        <option value="male">ชาย / Male</option>
                                        <option value="female">หญิง / Female</option>
                                        <option value="other">อื่นๆ / Other</option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="personAge" class="form-label">อายุ<span style="color: red;">*</span></label><br>
                                    <label for="SubpersonAge" class="sub-form-label">Age</label>
                                    <input type="number" class="form-control" id="personAge" min="0" placeholder="เช่น 25" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="personHeight" class="form-label">ส่วนสูง (ซม.)<span style="color: red;">*</span></label><br>
                                    <label for="SubpersonHeight" class="sub-form-label">Height (cm)</label>
                                    <input type="number" class="form-control" id="personHeight" min="0" placeholder="เช่น 165" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="personLocation" class="form-label">สถานที่พบเห็นล่าสุด<span style="color: red;">*</span></label><br>
                                    <label for="SubpersonLocation" class="sub-form-label">Last seen location</label>
                                    <input type="text" class="form-control" id="personLocation" placeholder="เช่น หน้าหอสมุด มหาวิทยาลัย" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="personDate" class="form-label">วันที่หายตัวไป<span style="color: red;">*</span></label><br>
                                    <label for="SubpersonDate" class="sub-form-label">Missing date</label>
                                    <input type="date" class="form-control" id="personDate" required>
                                </div>
                                <div class="col-12">
                                    <label for="personDetail" class="form-label">ลักษณะเด่น / เสื้อผ้าที่สวมใส่</label><br>
                                    <label for="SubpersonDetail" class="sub-form-label">Distinguishing features / clothing worn</label>
                                    <textarea class="form-control" id="personDetail" rows="4" placeholder="อธิบายรูปพรรณ ตำหนิ เสื้อผ้า หรือจุดสังเกตอื่น ๆ"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="personImages" class="form-label">แนบภาพบุคคล <span style="color: red;">*</span> </label><br>
                                    <label for="SubpersonImages" class="sub-form-label">Attach photos (up to 8 images)</label>
                                    <input type="file" class="form-control" id="personImages" accept="image/*" multiple>
                                    <div id="personImagesError" class="text-danger small mt-1"></div>
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-primary form-submit-btn">แจ้งบุคคลหาย</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Footer -->
    <div class="footer-section">
        <div class="container">
            <div class="row justify-content-center text-center">
                <p class="sfw mb-0">&copy; 2026 Upfound Co. All rights reserved.</p>
            </div>
        </div>
    </div>

</body>
</html>
