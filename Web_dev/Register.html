    <link rel="stylesheet" href="style.css">
</head>
<body>
       <!-- Nav-Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm ub-bg">
        <div class="container-fluid ub-bg pd">
            <img src="Assest/UPFOUND.svg" alt="Company Logo" class = "Logo">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Support</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-light" href="#">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="login-section d-flex align-items-center full-blue">
        <div class="container-fluid">
            <div class="row justify-content-center text-center">
                <div class="login-box text-start">
                    <div class="text-center mb-4">
                        <img src="Assest/UPFOUND2.svg" alt="Upfound Logo" class="login-logo mb-3">
                        <h4 class="login-heading">สมัครสมาชิก</h4>
                    </div>
                    <form>
                        <div class="mb-3">
                            <label for="UserPassword" class="form-label">ชื่อผู้ใช้</label>
                            <input type="password" id="UserPassword" class="form-control" placeholder="Ex. นายอัฟฟาน ใจดี" required>
                        </div>
                        <div class="mb-3">
                            <label for="UserEmail" class="form-label">อีเมล</label>
                            <input type="email" id="UserEmail" class="form-control" placeholder="Thatphong@example.com" required>
                        </div>
                        <div class="mb-2">
                            <label for="UserPassword" class="form-label">รหัสผ่าน</label>
                            <input type="password" id="UserPassword" class="form-control" placeholder="รหัสผ่านของคุณ" required>
                        </div>
                        <div class="text-end mb-3">
                            <a href="#" class="login-link">ลืมรหัสผ่าน?</a>
                        </div>
                        <button type="submit" class="btn btn-primary form-submit-btn w-100">เข้าสู่ระบบ</button>
                        <p class="text-center mt-4 mb-0">มีบัญชีอยู่แล้ว? <a href="login.html" class="login-link">เข้าสู่ระบบ</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    
        <!-- Footer -->
    <div class="footer-section">
        <div class="container">
            <div class="row justify-content-center text-center">
                <p class="sfw mb-0">&copy; 2026 Upfound Co. All rights reserved.</p>
            </div>
        </div>
    </div>
