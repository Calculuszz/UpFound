<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upfound</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Nav-Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm ub-bg">
        <div class="container-fluid ub-bg pd">
            <a href="index.html"><img src="Asset/UPFOUND.svg" alt="Company Logo" class = "Logo"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="About.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="Support.html">Support</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-light" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="item-form-body d-flex align-items-center">
        <div class="container-fluid">
            <div class = "row justify-content-center text-center">
                <h1 class="form-heading mb-4"> แบบฟอร์มแจ้งพบสิ่งของ</h1>
                <div class="col-12 col-lg-8">
                    <div class="form-doc-item text-start">
                        <form>
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="foundItemName" class="form-label">ชื่อสิ่งของที่พบ<span style="color: red;">*</span></label><br>
                                    <label class="sub-form-label">Name of found item</label>
                                    <input type="text" class="form-control" id="foundItemName" placeholder="เช่น กระเป๋าสตางค์" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="foundItemColor" class="form-label">สี</label><br>
                                    <label class="sub-form-label">Color</label>
                                    <input type="text" class="form-control" id="foundItemColor" placeholder="เช่น สีดำ">
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="foundItemLocation" class="form-label">สถานที่ที่พบ<span style="color: red;">*</span></label><br>
                                    <label class="sub-form-label">Where you found it</label>
                                    <input type="text" class="form-control" id="foundItemLocation" placeholder="เช่น หน้าหอสมุด มหาวิทยาลัย" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="foundItemDate" class="form-label">วันที่พบ<span style="color: red;">*</span></label><br>
                                    <label class="sub-form-label">Found date</label>
                                    <input type="date" class="form-control" id="foundItemDate" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="foundItemContact" class="form-label">ช่องทางติดต่อคุณ<span style="color: red;">*</span></label><br>
                                    <label class="sub-form-label">Your contact (so the owner can reach you)</label>
                                    <input type="text" class="form-control" id="foundItemContact" placeholder="เช่น เบอร์โทร / Line" required>
                                </div>
                                <div class="col-12">
                                    <label for="foundItemDetail" class="form-label">ลักษณะสิ่งของ</label><br>
                                    <label class="sub-form-label">Detail</label>
                                    <textarea class="form-control" id="foundItemDetail" rows="4" placeholder="อธิบายลักษณะ ขนาด ตำหนิ หรือจุดสังเกตอื่น ๆ"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="foundItemImages" class="form-label">แนบภาพสิ่งของ <span style="color: red;">*</span></label><br>
                                    <label class="sub-form-label">Attach photos (up to 8 images)</label>
                                    <input type="file" class="form-control" id="foundItemImages" accept="image/*" multiple>
                                    <div id="foundItemImagesError" class="text-danger small mt-1"></div>
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-primary form-submit-btn">แจ้งพบสิ่งของ</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-section">
        <div class="container">
            <div class="row justify-content-center text-center">
                <p class="sfw mb-0">&copy; 2026 Upfound Co. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="upfound.js"></script>
</body>
</html>
