<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upfound</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Nav-Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm ub-bg">
        <div class="container-fluid ub-bg pd">
            <img src="Asset/UPFOUND.svg" alt="Company Logo" class = "Logo">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Support</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-light" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="item-form-body d-flex align-items-center">
        <div class="container-fluid">
            <div class = "row justify-content-center text-center">
                <h1 class="form-heading mb-4"> แบบฟอร์มแจ้งของหาย</h1>
                <div class="col-12 col-lg-8">
                    <div class="form-doc-item text-start">
                        <form>
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label for="itemName" class="form-label">ชื่อสิ่งของ<span style="color: red;">*</span></label><br>
                                    <label for="SubitemName" class="sub-form-label">Name of properties</label>
                                    <input type="text" class="form-control" id="itemName" placeholder="เช่น กระเป๋าสตางค์" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="itemColor" class="form-label">สี<span style="color: red;">*</span></label><br>
                                    <label for="SubitemColor" class="sub-form-label">Color of properties</label>
                                    <input type="text" class="form-control" id="itemColor" placeholder="เช่น สีดำ" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="itemQty" class="form-label">จำนวนสิ่งของ<span style="color: red;">*</span></label><br>
                                    <label for="SubitemQty" class="sub-form-label">Quantity</label>
                                    <input type="number" class="form-control" id="itemQty" min="1" value="1" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="itemType" class="form-label">ประเภทของทรัพย์สิน<span style="color: red;">*</span></label><br>
                                    <label for="SubitemType" class="sub-form-label">Property type</label>
                                    <select class="form-select" id="itemType" required>
                                        <option value="selected disabled">เลือกประเภททรัพย์สิน</option>
                                        <option value="general">ทรัพย์สินทั่วไป / General properties</option>
                                        <option value="valuable">ทรัพย์สินมีค่า / Valuable properties</option>
                                        <option value="perishable">ทรัพย์สินเสื่อมสภาพ / Detrior properties</option>
                                        <option value="fresh">ของสด/เน่าเสีย / Spoiled properties </option>
                                    </select>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="itemLocation" class="form-label">สถานที่พบเห็นล่าสุด<span style="color: red;">*</span></label><br>
                                    <label for="SubitemLocation" class="sub-form-label">Location of properties</label>
                                    <input type="text" class="form-control" id="itemLocation" placeholder="เช่น หน้าหอสมุด มหาวิทยาลัย" required>
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="itemDate" class="form-label">วันที่ของหาย<span style="color: red;">*</span></label><br>
                                    <label for="SubitemDate" class="sub-form-label">Lost date</label>
                                    <input type="date" class="form-control" id="itemDate" required>
                                </div>
                                <div class="col-12">
                                    <label for="itemDetail" class="form-label">ลักษณะสิ่งของ</label><br>
                                    <label for="SubitemDetai;" class="sub-form-label">Detail of properties</label>
                                    <textarea class="form-control" id="itemDetail" rows="4" placeholder="อธิบายลักษณะ ขนาด ตำหนิ หรือจุดสังเกตอื่น ๆ"></textarea>
                                </div>
                                <div class="col-12">
                                    <label for="itemImages" class="form-label">แนบภาพสิ่งของ <span style="color: red;">*</span> </label><br>
                                    <label for="SubitemImages" class="sub-form-label">Attach photos (up to 8 images)</label>
                                    <input type="file" class="form-control" id="itemImages" accept="image/*" multiple>
                                    <div id="itemImagesError" class="text-danger small mt-1"></div>
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-primary form-submit-btn">แจ้งของหาย</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <!-- Footer -->
    <div class="footer-section">
        <div class="container">
            <div class="row justify-content-center text-center">
                <p class="sfw mb-0">&copy; 2026 Upfound Co. All rights reserved.</p>
            </div>
        </div>
    </div>

</body>
</html>
